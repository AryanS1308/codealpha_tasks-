<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetheria | Immersive Visual Gallery</title>
  <meta name="description" content="A curated immersive image gallery showcasing nature, architecture, and animals in high-definition with responsive grid layouts and interactive viewing.">
  
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Background Decorative Orbs -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <header class="app-header">
    <div class="logo">
      <span class="logo-accent"></span>
      <h1>Aetheria</h1>
    </div>
    <p class="subtitle">An immersive, glassmorphic visual showcase capturing nature, architectural wonders, and wildlife.</p>
    
    <!-- Category Filter Controls -->
    <div class="filter-container" id="filter-controls">
      <button class="filter-btn active" data-filter="all" id="filter-all">
        <span>All Artifacts</span>
      </button>
      <button class="filter-btn" data-filter="nature" id="filter-nature">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22a10 10 0 0 1 20 0M12 2a10 10 0 0 1-5 8.66l5 1.73M12 2a10 10 0 0 0 5 8.66l-5 1.73M12 2v20"/></svg>
        <span>Nature</span>
      </button>
      <button class="filter-btn" data-filter="architecture" id="filter-architecture">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
        <span>Architecture</span>
      </button>
      <button class="filter-btn" data-filter="animals" id="filter-animals">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/></svg>
        <span>Animals</span>
      </button>
    </div>
  </header>

  <main class="gallery-section">
    <!-- Gallery Grid -->
    <div class="gallery-grid" id="gallery-grid">
      <!-- Generated dynamically by app.js -->
    </div>
    
    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
      <h3>No items found</h3>
      <p>Try selecting a different filter category.</p>
    </div>
  </main>

  <!-- Interactive Lightbox Modal -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-hidden="true" tabindex="-1">
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    
    <!-- Top Actions -->
    <div class="lightbox-header">
      <div class="lightbox-counter" id="lightbox-counter">0 / 0</div>
      <button class="lightbox-close" id="lightbox-close" aria-label="Close Lightbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Navigation Controls -->
    <button class="lightbox-nav nav-prev" id="lightbox-prev" aria-label="Previous Image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    
    <!-- Main Content Area -->
    <div class="lightbox-content" id="lightbox-content">
      <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>
    
    <button class="lightbox-nav nav-next" id="lightbox-next" aria-label="Next Image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Info Captions (Glassmorphic) -->
    <div class="lightbox-footer">
      <div class="lightbox-meta">
        <span class="lightbox-tag" id="lightbox-tag">Category</span>
        <h2 class="lightbox-title" id="lightbox-title">Image Title</h2>
        <p class="lightbox-desc" id="lightbox-desc">Detailed explanation of the visual artwork.</p>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <p>&copy; 2026 Aetheria Gallery. All rights reserved.</p>
  </footer>

  <!-- Application Logic -->
  <script type="module" src="./app.js"></script>
</body>
</html>
